<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Daily Cozy Planner</title>

<link rel="stylesheet" href="styles/main.css">

</head>

<body>

<div class="planner">

<h1 class="title">DAILY PLANNER</h1>

<div class="dayRow">
<span>DAY:</span>
<span id="date"></span>
</div>

<div class="layout">

<div class="todoSection">

<h2>TO DO LIST</h2>

<div class="taskInput">
<input id="taskInput" placeholder="Add task...">
<button id="addBtn">+</button>
</div>

<ul id="taskList"></ul>

</div>

<div class="sideColumn">

<div class="box">

<h2>WHAT I'M GRATEFUL FOR TODAY</h2>

<textarea id="gratitude"></textarea>

</div>

<div class="box">

<h2>NOTES</h2>

<textarea id="notes"></textarea>

</div>

<div class="box">

<h2>SECRET CHARACTER</h2>

<div id="characterArea"></div>

</div>

</div>

</div>

</div>

<div id="revealModal" class="hidden"></div>

<script type="module" src="scripts/app.js"></script>

</body>
</html>
